# Copy this file to `config.toml` before running locally.
# For the Windows service, place it at:
# `C:\ProgramData\ha-system-ronitor\config\config.toml`

[mqtt]
host = "10.0.0.1"
port = 1883
username = "homeassistant"
password = "change-me"

[home_assistant]
discovery_prefix = "homeassistant"
status_topic = "homeassistant/status"
topic_prefix = "monitor/system"

[device]
# node_id = "my-host"
# name = "My Host System Monitor"

[host]
enabled = true

[cpu]
enabled = true
sampling_interval_secs = 1
usage_threshold_pct = 1.0

[gpu]
enabled = true
sampling_interval_secs = 1
usage_threshold_pct = 1.0
memory_change_threshold_mib = 8

[memory]
enabled = true
sampling_interval_secs = 5
change_threshold_mib = 8

[uptime]
enabled = true
sampling_interval_secs = 300

[disk]
enabled = true
sampling_interval_secs = 30
change_threshold_mib = 32
include_paths = ["/", "/mnt/data"]

[network]
enabled = true
sampling_interval_secs = 1
include_interfaces = ["Ethernet", "Wi-Fi"]
rate_change_threshold_bps = 10240
total_change_threshold_bytes = 10240

[lighthouse]
enabled = false
sampling_interval_secs = 300
# secret_id = "AKID..."
# secret_key = "..."
# session_token = "..."
# region = "ap-chengdu"
# instance_id = "lhins-xxxxxxxx"
# endpoint = "lighthouse.tencentcloudapi.com"

[shutdown]
enable_button = false
payload = "shutdown"
cancel_payload = "cancel"
delay_secs = 30
dry_run = false
